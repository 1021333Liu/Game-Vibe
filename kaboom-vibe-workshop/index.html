<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Vibe - 西游劫难</title>
  </head>
  <body>
    <div id="game-shell">
      <div id="game-brand">
        <span>Game Vibe</span>
        <strong>西游劫难</strong>
      </div>
      <div id="game-ui-note">WASD 移动 · 方向键/IJKL 点射 · P 暂停</div>
      <div id="start-menu" aria-label="开始菜单">
        <div id="start-panel">
          <span class="start-kicker">The Binding of Isaac Inspired</span>
          <h1>西游劫难</h1>
          <p>踏过火焰山、白骨洞、狮驼岭与小雷音寺，在点射节奏里闯过这一轮取经路。</p>
          <button id="start-button" type="button">开始取经</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
